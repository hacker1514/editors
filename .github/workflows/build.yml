name: Build Cross-Platform Executables

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable
      run: |
        echo "Building on ${{ matrix.os }}"

        # PyInstaller hidden imports for prompt_toolkit
        HIDDEN_IMPORTS="--hidden-import prompt_toolkit.lexers \
                        --hidden-import prompt_toolkit.widgets \
                        --hidden-import prompt_toolkit.completion"

        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          pyinstaller --onefile --name MyEditor.exe $HIDDEN_IMPORTS main.py
        else
          pyinstaller --onefile --name MyEditor $HIDDEN_IMPORTS main.py

    - name: Upload Binaries
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.os }}-binaries
        path: dist/*
